<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">kamod-hooks docs preview banner</title>
  <desc id="desc">Stylized preview banner of the kamod-hooks documentation site with sidebar, hero content, code panel, and demo cards.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#d9f3ef"/>
      <stop offset="1" stop-color="#f3efe3"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1280" height="720" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="0" flood-color="#163f3a" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="24" y="24" width="1232" height="672" rx="0" fill="#fcfaf3" stroke="#163f3a" stroke-width="4" filter="url(#shadow)"/>

  <rect x="24" y="24" width="1232" height="64" fill="#0f766e" stroke="#163f3a" stroke-width="4"/>
  <rect x="48" y="44" width="18" height="18" fill="#fcfaf3" stroke="#163f3a" stroke-width="3"/>
  <text x="82" y="58" fill="#fcfaf3" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="24" font-weight="700">kamod-hooks</text>
  <text x="908" y="58" fill="#d7fffa" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">Guide</text>
  <text x="996" y="58" fill="#d7fffa" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">Hooks</text>
  <text x="1082" y="58" fill="#d7fffa" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">GitHub</text>

  <rect x="48" y="112" width="248" height="552" fill="#eef7f5" stroke="#163f3a" stroke-width="3"/>
  <rect x="68" y="136" width="208" height="42" fill="#fcfaf3" stroke="#163f3a" stroke-width="3"/>
  <text x="86" y="162" fill="#49635f" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16">Search</text>

  <text x="68" y="214" fill="#49635f" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" font-weight="700">Guide</text>
  <rect x="68" y="228" width="208" height="34" fill="#d9f3ef" stroke="#163f3a" stroke-width="2"/>
  <text x="84" y="250" fill="#163f3a" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15">Introduction</text>
  <text x="84" y="284" fill="#163f3a" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15">Installation</text>
  <text x="84" y="314" fill="#163f3a" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15">Getting started</text>

  <text x="68" y="370" fill="#49635f" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" font-weight="700">Hooks</text>
  <text x="84" y="402" fill="#163f3a" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15">useToggle</text>
  <text x="84" y="432" fill="#163f3a" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15">useCounter</text>
  <text x="84" y="462" fill="#163f3a" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15">useRequest</text>
  <text x="84" y="492" fill="#163f3a" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15">useUrlState</text>

  <rect x="320" y="112" width="640" height="552" fill="#fcfaf3" stroke="#163f3a" stroke-width="3"/>
  <text x="352" y="168" fill="#163f3a" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="46" font-weight="700">Production-ready hooks for Preact.</text>
  <text x="352" y="208" fill="#49635f" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20">Zero runtime deps. Live demos. TypeScript-first. Vintage docs UI.</text>

  <rect x="352" y="244" width="164" height="48" fill="#0f766e" stroke="#163f3a" stroke-width="3"/>
  <text x="386" y="274" fill="#fcfaf3" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" font-weight="700">Get started</text>
  <rect x="532" y="244" width="184" height="48" fill="#d9f3ef" stroke="#163f3a" stroke-width="3"/>
  <text x="570" y="274" fill="#163f3a" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" font-weight="700">View hooks</text>

  <rect x="352" y="328" width="272" height="124" fill="#eef7f5" stroke="#163f3a" stroke-width="3"/>
  <text x="372" y="358" fill="#49635f" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14">Install</text>
  <text x="372" y="398" fill="#163f3a" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22">pnpm add @kamod-ch/hooks preact</text>
  <text x="372" y="430" fill="#49635f" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14">Tree-shakeable root exports and subpath imports.</text>

  <rect x="648" y="328" width="280" height="124" fill="#eef7f5" stroke="#163f3a" stroke-width="3"/>
  <text x="668" y="358" fill="#49635f" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14">Live demo</text>
  <rect x="668" y="374" width="240" height="58" fill="#fcfaf3" stroke="#163f3a" stroke-width="2"/>
  <text x="686" y="408" fill="#163f3a" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">useToggle  true / false</text>

  <rect x="352" y="480" width="576" height="152" fill="#163f3a" stroke="#163f3a" stroke-width="3"/>
  <text x="372" y="510" fill="#9ce8db" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14">Source</text>
  <text x="372" y="548" fill="#fcfaf3" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20">import { useToggle } from '@kamod-ch/hooks'</text>
  <text x="372" y="580" fill="#fcfaf3" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20">const [on, { toggle }] = useToggle(false)</text>
  <text x="372" y="612" fill="#fcfaf3" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20">&lt;button onClick={toggle}&gt;{String(on)}&lt;/button&gt;</text>

  <rect x="984" y="112" width="248" height="552" fill="#eef7f5" stroke="#163f3a" stroke-width="3"/>
  <text x="1006" y="146" fill="#49635f" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" font-weight="700">On this page</text>
  <text x="1006" y="184" fill="#163f3a" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15">- Install</text>
  <text x="1006" y="214" fill="#163f3a" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15">- Examples</text>
  <text x="1006" y="244" fill="#163f3a" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15">- Source</text>

  <rect x="1006" y="294" width="204" height="110" fill="#fcfaf3" stroke="#163f3a" stroke-width="2"/>
  <text x="1024" y="326" fill="#49635f" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14">Highlights</text>
  <text x="1024" y="356" fill="#163f3a" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14">• Searchable docs</text>
  <text x="1024" y="382" fill="#163f3a" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14">• Visible source</text>

  <rect x="1006" y="432" width="204" height="110" fill="#fcfaf3" stroke="#163f3a" stroke-width="2"/>
  <text x="1024" y="464" fill="#49635f" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14">Best picks</text>
  <text x="1024" y="494" fill="#163f3a" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14">• useToggle</text>
  <text x="1024" y="520" fill="#163f3a" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14">• useCounter</text>
</svg>
