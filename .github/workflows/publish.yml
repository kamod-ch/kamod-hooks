name: Publish packages

on:
  push:
    tags:
      - "v*"

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Checkout preactpress
        run: git clone --depth 1 https://github.com/kamod-ch/preactpress.git "$(dirname "${GITHUB_WORKSPACE}")/preactpress"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Build preactpress
        run: |
          cd "$(dirname "${GITHUB_WORKSPACE}")/preactpress"
          pnpm install --frozen-lockfile
          pnpm build

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test:ci

      - name: Build project
        run: pnpm build

      - name: Validate published package shape
        run: pnpm qa:package

      - name: Configure npm registry authentication
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "::error::NPM_TOKEN repository secret is missing or empty." >&2
            exit 1
          fi
          {
            echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}"
          } >> .npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify npm authentication
        run: npm whoami --registry=https://registry.npmjs.org
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @kamod-hooks/core to npm
        working-directory: packages/core
        run: pnpm publish --access public --provenance --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
